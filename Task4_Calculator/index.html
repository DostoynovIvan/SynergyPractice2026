<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>Простой калькулятор</h1>

        <div class="inputs">
            <input type="text" id="num1" placeholder="Первое число">
            <input type="text" id="num2" placeholder="Второе число">
        </div>

        <div class="buttons">
            <button id="sum">сумма</button>
            <button id="sub">разность</button>
            <button id="mul">произведение</button>
            <button id="div">деление</button>
        </div>

        <div class="result">
            <span>Результат:</span>
            <div id="resultDisplay">—</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
